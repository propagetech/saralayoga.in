name: Heartbeat — keep scheduled workflows active

# GitHub auto-disables scheduled workflows after 60 days of repo inactivity.
# This workflow runs twice a month and updates .github/HEARTBEAT.md, which
# counts as a commit and resets the 60-day inactivity counter.
#
# Without this, cert-renewal.yml would silently stop running after 60 days
# of no human commits to the repo. With this, the system is self-sustaining
# indefinitely.
#
# No setup required — uses only the default GITHUB_TOKEN.

on:
  schedule:
    - cron: '0 0 1,15 * *'   # 1st and 15th of every month at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  beat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update heartbeat file
        run: |
          mkdir -p .github
          {
            echo "# Heartbeat"
            echo ""
            echo "Last beat: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo ""
            echo "This file is updated automatically twice a month by .github/workflows/heartbeat.yml"
            echo "to prevent GitHub from auto-disabling our scheduled workflows after 60 days of"
            echo "repo inactivity. Do not edit by hand — the workflow will overwrite it."
          } > .github/HEARTBEAT.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/HEARTBEAT.md
          if git diff --cached --quiet; then
            echo "::notice::No changes to commit (file unchanged this run)"
          else
            git commit -m "chore: heartbeat $(date -u '+%Y-%m-%d')"
            git push
            echo "::notice::Heartbeat committed; 60-day timer reset"
          fi