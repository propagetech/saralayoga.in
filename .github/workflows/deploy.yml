name: Deploy static site to GitHub Pages

# Builds and publishes the site on every push to main. Replaces the legacy
# "Deploy from a branch" mode with explicit, customisable build steps.
#
# Includes a sitemap.xml lastmod refresh — search engines see a fresh timestamp
# on every deploy without any manual editing.
#
# IMPORTANT: cloudflare-purge.yml chains off this workflow's `name:` field
# ("Deploy static site to GitHub Pages"). If you rename this workflow, update
# the `workflows:` array in cloudflare-purge.yml to match, otherwise Cloudflare's
# cache won't auto-purge on deploys.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update sitemap lastmod for deploy
        run: |
          if [ -f sitemap.xml ]; then
            ISODATE=$(date +%Y-%m-%d)
            sed -i "s/<lastmod>.*<\/lastmod>/<lastmod>${ISODATE}<\/lastmod>/g" sitemap.xml
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4